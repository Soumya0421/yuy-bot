# nixpacks.toml — Yuy bot: Node.js + Python in one container
# DO NOT list nixPkgs manually — nixpacks auto-installs them via providers.
# Listing them manually causes a Nix profile conflict (two Python derivations).

providers = ["node", "python"]

[phases.install]
cmds = [
  "npm ci --omit=dev",
  "pip install aiohttp beautifulsoup4 readability-lxml lxml"
]

[start]
cmd = "node src/index.js"