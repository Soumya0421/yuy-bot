# nixpacks.toml — Yuy bot: Node.js + Python in one container
# Providers auto-install Node 20 + Python 3.11 via Nix — don't list nixPkgs manually.
# pip3 is used explicitly because nixpacks puts it at pip3, not pip.

providers = ["node", "python"]

[phases.install]
cmds = [
  "npm ci --omit=dev"
]

[phases.pythonDeps]
dependsOn = ["install"]
cmds = [
  "pip3 install aiohttp beautifulsoup4 readability-lxml lxml"
]

[start]
cmd = "node src/index.js"
